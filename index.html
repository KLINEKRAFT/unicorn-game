<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>Unicorn Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-shell">
    <canvas id="gameCanvas" width="720" height="1280"></canvas>

    <div id="startOverlay" class="overlay">
      <div class="overlay-card">
        <h1>UNICORN RUN</h1>
        <p>Collect fruit and reach the end.</p>
        <button id="startButton">PRESS START</button>
      </div>
    </div>

    <div id="hud">
      <div id="scoreBox">Score: <span id="scoreValue">0</span></div>
    </div>

    <div id="controls">
      <div class="left-controls">
        <button id="leftBtn" class="control-btn" aria-label="Move Left">
          <img src="button_left.png" alt="Left" />
        </button>
        <button id="rightBtn" class="control-btn" aria-label="Move Right">
          <img src="button_right.png" alt="Right" />
        </button>
      </div>

      <div class="right-controls">
        <button id="jumpBtn" class="control-btn jump-btn" aria-label="Jump">
          <img src="button_jump.png" alt="Jump" />
        </button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
