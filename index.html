<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Unicorn Run</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-shell">
    <canvas id="game" width="405" height="720" aria-label="Unicorn Run game canvas"></canvas>

    <div id="start-screen" class="overlay visible">
      <div class="panel">
        <h1>UNICORN RUN</h1>
        <p>Portrait iPhone platformer placeholder screen</p>
        <button id="start-btn">Press Start</button>
        <div class="help">Move with arrows. Tap jump to leap and collect food.</div>
      </div>
    </div>

    <div id="game-over-screen" class="overlay hidden">
      <div class="panel">
        <h2>Level Complete</h2>
        <p id="final-score">Score: 0</p>
        <button id="restart-btn">Play Again</button>
      </div>
    </div>

    <div id="hud">
      <div>Score: <span id="score">0</span></div>
    </div>

    <div id="touch-controls">
      <button id="left-btn" class="control" aria-label="Move left"></button>
      <button id="jump-btn" class="control jump" aria-label="Jump"></button>
      <button id="right-btn" class="control" aria-label="Move right"></button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
