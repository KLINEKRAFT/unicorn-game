<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b1d2e" />
  <title>Unicorn Run</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-shell">
    <canvas id="game" width="405" height="720" aria-label="Unicorn Run game canvas"></canvas>

    <div id="start-screen" class="overlay visible">
      <div class="panel">
        <h1>UNICORN RUN</h1>
        <p>Retro platformer test build</p>
        <button id="start-btn">PRESS START</button>
        <div class="help">Move with arrows. Jump, collect food, and enter the portal.</div>
      </div>
    </div>

    <div id="end-screen" class="overlay hidden">
      <div class="panel">
        <h2 id="end-title">LEVEL CLEAR</h2>
        <p id="final-score">Score: 0</p>
        <button id="restart-btn">PLAY AGAIN</button>
      </div>
    </div>

    <div id="hud">
      <div class="hud-box">
        <span class="hud-label">SCORE</span>
        <span id="score">0</span>
      </div>
      <div class="hud-box health-box">
        <span class="hud-label">HP</span>
        <img id="health-ui" src="assets/health_bar/healthbar_5.png" alt="Health bar">
      </div>
    </div>

    <div id="touch-controls">
      <button id="left-btn" class="control" aria-label="Move left"></button>
      <button id="jump-btn" class="control jump" aria-label="Jump"></button>
      <button id="right-btn" class="control" aria-label="Move right"></button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
